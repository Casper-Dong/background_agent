version: "3.9"

services:
  # ── Postgres ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-background_agent}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent-local-dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./server/src/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API Server ────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        API_PORT: ${API_PORT:-3001}
    command: ["node", "dist/index.js"]
    env_file: .env
    environment:
      API_PORT: ${API_PORT:-3001}
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker ────────────────────────────────────────────
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - sandbox_workspaces:/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Web UI ────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      API_PORT: ${API_PORT:-3001}
    ports:
      - "1259:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Nginx reverse proxy (optional) ───────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    profiles:
      - with-proxy

volumes:
  pg_data:
  redis_data:
  sandbox_workspaces:
