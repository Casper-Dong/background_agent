# Slack App Manifest
# Import at: https://api.slack.com/apps → "Create New App" → "From a manifest"
# Replace YOUR_DOMAIN with your actual API endpoint.

display_information:
  name: RUE
  description: Repo Utility Engineer
  background_color: "#C9733E"

features:
  bot_user:
    display_name: RUE
    always_online: true
  slash_commands:
    - command: /inspect
      url: https://YOUR_DOMAIN/api/slack/commands
      description: Start a repo utility task
      usage_hint: "[task description]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - chat:write.public

settings:
  interactivity:
    is_enabled: true
    request_url: https://YOUR_DOMAIN/api/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
